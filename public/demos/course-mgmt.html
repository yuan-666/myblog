<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Course Mgmt · Demo</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;padding:40px 20px}.app{max-width:720px;width:100%}header{text-align:center;margin-bottom:24px;padding:24px;background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}header h1{font-size:24px;font-weight:700;margin-bottom:4px}header p{font-size:13px;color:#86868b}.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}.search-inp{flex:1;min-width:150px;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;outline:none;font-family:inherit}.search-inp:focus{border-color:#0071e3}.sort-btn{padding:8px 14px;border-radius:10px;border:1px solid #d2d2d7;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}.sort-btn.active{background:#0071e3;color:#fff;border-color:#0071e3}.add-btn{padding:10px 18px;background:#34c759;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}.add-btn:hover{opacity:.85}.table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}.table-row{display:grid;grid-template-columns:2fr .7fr 1.2fr .8fr;padding:12px 20px;font-size:14px;border-bottom:1px solid #f5f5f7;align-items:center}.table-row.header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#86868b;background:#fafafa}.table-row:last-child{border-bottom:none}.course-name{font-weight:600;cursor:pointer}.course-name:hover{color:#0071e3}.course-credit{font-family:monospace;color:#0071e3;font-weight:500}.course-teacher{color:#86868b}.course-actions{display:flex;gap:6px}.course-actions button{padding:4px 10px;border-radius:6px;border:1px solid #e5e5ea;background:#fff;font-size:11px;cursor:pointer;font-family:inherit}.course-actions button.del{color:#ff3b30;border-color:#ff3b30}.course-actions button.del:hover{background:#ff3b30;color:#fff}.course-actions button.edit{color:#0071e3}.course-actions button.edit:hover{background:#0071e3;color:#fff}.count-bar{margin-top:12px;text-align:center;font-size:12px;color:#86868b}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100;display:none}.modal-overlay.show{display:flex}.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.15)}.modal h3{font-size:16px;margin-bottom:16px}.modal input{width:100%;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit}.modal input:focus{border-color:#0071e3}.modal-actions{display:flex;gap:8px;margin-top:4px}.modal-actions button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}.modal-actions button.primary{background:#0071e3;color:#fff}.modal-actions button.cancel{background:#f5f5f7;color:#86868b}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:13px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s;background:#34c759;color:#fff}.toast.show{opacity:1}</style></head>
<body><style>.app{animation:rise .45s ease both}.table-row:not(.header){transition:transform .15s,background .15s}.table-row:not(.header):hover{transform:translateX(3px);background:#fbfbfd}.sort-btn,.add-btn,.course-actions button,.modal-actions button{transition:transform .15s,box-shadow .15s,background .15s}.sort-btn:hover,.add-btn:hover,.course-actions button:hover,.modal-actions button:hover{transform:translateY(-1px)}.sort-btn.active,.add-btn{box-shadow:0 8px 18px rgba(0,113,227,.14)}.modal{animation:pop .2s ease}.search-inp:focus{box-shadow:0 0 0 3px rgba(0,113,227,.1)}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}</style><script>const L=((p=new URLSearchParams(location.search)).get('lang')||navigator.language.slice(0,2))==='en'?'en':'zh';const T=(zh,en)=>L==='en'?en:zh;</script>
<div class="app">
<header><h1>📚 <script>document.write(T('课程信息管理系统','Course Management System'))</script></h1><p><script>document.write(T('CSV加载 · 排序显示 · 按名查询 · 持久化保存','CSV Load · Sort · Search · Persistence'))</script></p></header>
<div class="controls">
  <input class="search-inp" id="search" type="text" placeholder="Search..." onkeyup="renderTable()">
  <button class="sort-btn active" id="sort-name" onclick="setSort('name')"><script>document.write(T('按名称','By Name'))</script></button>
  <button class="sort-btn" id="sort-credit" onclick="setSort('credit')"><script>document.write(T('按学分','By Credits'))</script></button>
  <button class="sort-btn" id="sort-teacher" onclick="setSort('teacher')"><script>document.write(T('按教师','By Teacher'))</script></button>
  <button class="add-btn" onclick="showAddModal()">+ <script>document.write(T('添加课程','Add Course'))</script></button>
</div>
<div class="table-wrap">
  <div class="table-row header"><span><script>document.write(T('课程名称','Course'))</script></span><span><script>document.write(T('学分','Credits'))</script></span><span><script>document.write(T('授课教师','Teacher'))</script></span><span><script>document.write(T('操作','Actions'))</script></span></div>
  <div id="course-list"></div>
</div>
<div class="count-bar"><script>document.write(T('共','Total:'))</script> <span id="total">0</span> <script>document.write(T('门课程','courses'))</script></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <input id="modal-name" placeholder="Course name"><input id="modal-credit" type="number" step="0.5" placeholder="Credits (e.g. 3.5)"><input id="modal-teacher" placeholder="Teacher name">
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()"><script>document.write(T('取消','Cancel'))</script></button>
      <button class="primary" id="modal-submit" onclick="saveCourse()"><script>document.write(T('保存','Save'))</script></button>
    </div>
  </div>
</div><div class="toast" id="toast"></div>
<script>
const D=[{name:'数据结构',credit:4,teacher:'张教授'},{name:'操作系统',credit:3.5,teacher:'李教授'},{name:'计算机网络',credit:3,teacher:'王教授'},{name:'数据库原理',credit:3.5,teacher:'陈教授'},{name:'软件工程',credit:3,teacher:'刘教授'},{name:'编译原理',credit:4,teacher:'赵教授'},{name:'人工智能',credit:3,teacher:'周教授'}];
let courses=[],sortBy='name',editIdx=-1;
function load(){try{const d=localStorage.getItem('demo-courses');courses=d?JSON.parse(d):[...D]}catch{courses=[...D]}renderTable()}
function save(){try{localStorage.setItem('demo-courses',JSON.stringify(courses))}catch(e){t(T('存储空间不足','Storage full'))}renderTable()}
function setSort(s){sortBy=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));document.getElementById('sort-'+s).classList.add('active');renderTable()}
function getF(){const q=document.getElementById('search').value.trim().toLowerCase();let l=[...courses];if(q)l=l.filter(c=>c.name.toLowerCase().includes(q)||c.teacher.toLowerCase().includes(q));l.sort((a,b)=>sortBy==='name'?a.name.localeCompare(b.name,'zh'):sortBy==='credit'?a.credit-b.credit:a.teacher.localeCompare(b.teacher,'zh'));return l}
function renderTable(){const l=getF();document.getElementById('total').textContent=l.length;document.getElementById('course-list').innerHTML=l.map((c,i)=>{const idx=courses.indexOf(c);return'<div class="table-row"><span class="course-name">'+c.name+'</span><span class="course-credit">'+c.credit+'</span><span class="course-teacher">'+c.teacher+'</span><span class="course-actions"><button class="edit" onclick="showEditModal('+idx+')">'+T('编辑','Edit')+'</button><button class="del" onclick="deleteCourse('+idx+')">'+T('删除','Del')+'</button></span></div>'}).join('')}
function showAddModal(){editIdx=-1;document.getElementById('modal-title').textContent=T('添加课程','Add Course');document.getElementById('modal-name').value='';document.getElementById('modal-credit').value='';document.getElementById('modal-teacher').value='';document.getElementById('modal').classList.add('show')}
function showEditModal(i){editIdx=i;const c=courses[i];document.getElementById('modal-title').textContent=T('编辑课程','Edit Course');document.getElementById('modal-name').value=c.name;document.getElementById('modal-credit').value=c.credit;document.getElementById('modal-teacher').value=c.teacher;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function saveCourse(){const name=document.getElementById('modal-name').value.trim(),credit=parseFloat(document.getElementById('modal-credit').value),teacher=document.getElementById('modal-teacher').value.trim();if(!name||isNaN(credit)||!teacher){t(T('请填写完整信息','Fill all fields'));return}if(editIdx>=0)courses[editIdx]={name,credit,teacher};else courses.push({name,credit,teacher});save();closeModal();t(T('保存成功','Saved'))}
function deleteCourse(i){if(!confirm(T('确认删除？','Confirm delete?')))return;courses.splice(i,1);save();t(T('已删除','Deleted'))}
function t(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800)}
load();
</script></body></html>
