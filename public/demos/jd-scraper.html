<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JD Scraper · Demo</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;padding:30px 20px}.app{max-width:860px;margin:0 auto}header{text-align:center;margin-bottom:28px;padding:24px;background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}header h1{font-size:24px;font-weight:700;margin-bottom:4px}header p{font-size:13px;color:#86868b}.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.card h3{font-size:13px;font-weight:600;color:#86868b;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.filter-bar button{padding:5px 12px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;font-size:11px;cursor:pointer;font-family:inherit}.filter-bar button.active{background:#0071e3;color:#fff;border-color:#0071e3}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f5f5f7}th{font-size:10px;color:#86868b;text-transform:uppercase;font-weight:600}td.price{font-family:monospace;color:#ff3b30;font-weight:500}td.sales{font-family:monospace;color:#0071e3}.chart-bar{margin-bottom:6px;display:flex;align-items:center;gap:8px}.chart-bar .label{width:50px;font-size:11px;text-align:right;color:#86868b}.chart-bar .bar-track{flex:1;height:20px;background:#f5f5f7;border-radius:6px;overflow:hidden}.chart-bar .bar-fill{height:100%;border-radius:6px;transition:width .5s ease;background:linear-gradient(90deg,#6366f1,#a855f7)}.chart-bar .value{width:60px;font-size:11px;font-family:monospace;color:#1d1d1f}.word-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:16px;min-height:120px;align-items:center}.word-tag{padding:4px 12px;border-radius:20px;cursor:pointer;transition:transform .2s;font-family:monospace;font-weight:500;background:rgba(99,102,241,.08);color:#6366f1}.word-tag:hover{transform:scale(1.15)}.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.summary-item{text-align:center;padding:14px;background:#f5f5f7;border-radius:10px}.summary-item .sv{font-size:22px;font-weight:700;font-family:monospace}.summary-item .sl{font-size:10px;color:#86868b;text-transform:uppercase;margin-top:2px}@media(max-width:640px){.dashboard{grid-template-columns:1fr}}</style></head>
<body><style>.app{animation:rise .45s ease both}.card,.summary-item{transition:transform .18s,box-shadow .18s}.card:hover,.summary-item:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.08)}.filter-bar button{transition:transform .15s,background .15s}.filter-bar button:hover{transform:translateY(-1px)}tbody tr{transition:background .15s}tbody tr:hover{background:#fbfbfd}.bar-fill{animation:barIn .55s ease both}.word-tag{animation:pop .35s ease both}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}@keyframes barIn{from{width:0}}</style><script>const L=((p=new URLSearchParams(location.search)).get('lang')||navigator.language.slice(0,2))==='en'?'en':'zh';const T=(zh,en)=>L==='en'?en:zh;</script>
<div class="app">
<header><h1>🔍 <script>document.write(T('京东电商爬虫与数据分析','JD.com Product Scraper & Analysis'))</script></h1><p><script>document.write(T('Requests + Parsel · Jieba分词 · 词云分析','Requests + Parsel · Jieba · WordCloud'))</script></p></header>
<div class="summary-grid">
  <div class="summary-item"><span class="sv" id="total-products">8</span><span class="sl"><script>document.write(T('商品数','Products'))</script></span></div>
  <div class="summary-item"><span class="sv" id="avg-price">0</span><span class="sl"><script>document.write(T('均价','Avg Price'))</script> ¥</span></div>
  <div class="summary-item"><span class="sv" id="total-sales">0</span><span class="sl"><script>document.write(T('总销量','Total Sales'))</script></span></div>
</div>
<div class="filter-bar">
  <button class="active" onclick="filterData('all')"><script>document.write(T('全部','All'))</script></button>
  <button onclick="filterData('联想')">Lenovo</button>
  <button onclick="filterData('华为')">Huawei</button>
  <button onclick="filterData('Apple')">Apple</button>
  <button onclick="filterData('华硕')">ASUS</button>
  <button onclick="filterData('小米')">Xiaomi</button>
</div>
<div class="dashboard">
  <div class="card"><h3>📊 <script>document.write(T('价格对比','Price Comparison'))</script></h3><div id="price-chart"></div></div>
  <div class="card"><h3>🏷️ <script>document.write(T('词云分析','Keyword Cloud'))</script> (Jieba)</h3><div class="word-cloud" id="word-cloud"></div></div>
  <div class="card" style="grid-column:1/-1"><h3>📋 <script>document.write(T('商品数据表','Product Data'))</script></h3>
    <table><thead><tr><th><script>document.write(T('商品名称','Product'))</script></th><th><script>document.write(T('品牌','Brand'))</script></th><th><script>document.write(T('价格','Price'))</script> ¥</th><th><script>document.write(T('月销量','Sales'))</script></th><th><script>document.write(T('关键词','Keywords'))</script></th></tr></thead><tbody id="products-table"></tbody></table>
  </div>
</div></div>
<script>
const P=[{name:'联想 ThinkBook 14+',brand:'联想',price:5499,sales:12580,kw:['商务','轻薄','高性能']},{name:'华为 MateBook 14',brand:'华为',price:6299,sales:9842,kw:['触屏','协同','2K']},{name:'MacBook Air M3',brand:'Apple',price:8999,sales:15620,kw:['M3','续航','Retina']},{name:'华硕 无畏Pro15',brand:'华硕',price:4999,sales:7250,kw:['OLED','标压']},{name:'戴尔 灵越16',brand:'戴尔',price:6999,sales:5430,kw:['创作','RTX']},{name:'惠普 战66',brand:'惠普',price:4599,sales:8640,kw:['商务','军工']},{name:'小米 RedmiBook',brand:'小米',price:4299,sales:11200,kw:['性价比','MIUI+']},{name:'荣耀 MagicBook',brand:'荣耀',price:3999,sales:9310,kw:['护眼','轻薄']}];
const WT=[{t:'Python',s:28},{t:T('爬虫','Crawler'),s:26},{t:'Jieba',s:24},{t:T('数据分析','Analysis'),s:28},{t:T('词云','WordCloud'),s:30},{t:T('电商','E-com'),s:22},{t:'Requests',s:24},{t:'CSV',s:20},{t:T('京东','JD'),s:26},{t:'BeautifulSoup',s:18},{t:T('反爬','Anti-bot'),s:20},{t:'Cookie',s:18},{t:T('代理','Proxy'),s:16},{t:T('数据清洗','Cleaning'),s:22},{t:T('可视化','Viz'),s:24},{t:'Pandas',s:18},{t:'Matplotlib',s:20},{t:'WordCloud',s:22}];
let cf='all';
function filterData(b){cf=b;document.querySelectorAll('.filter-bar button').forEach(bn=>bn.classList.toggle('active',bn.textContent===b||(b==='all'&&bn.textContent===T('全部','All'))));render()}
function render(){const f=cf==='all'?P:P.filter(p=>p.brand===cf),maxP=Math.max(...f.map(p=>p.price));document.getElementById('price-chart').innerHTML=f.map(p=>'<div class="chart-bar"><span class="label">'+p.brand.slice(0,3)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(p.price/maxP*100).toFixed(0)+'%"></div></div><span class="value">¥'+p.price+'</span></div>').join('');document.getElementById('products-table').innerHTML=f.map(p=>'<tr><td><strong>'+p.name+'</strong></td><td>'+p.brand+'</td><td class="price">¥'+p.price.toLocaleString()+'</td><td class="sales">'+p.sales.toLocaleString()+'</td><td style="font-size:11px;color:#86868b">'+p.kw.join(' · ')+'</td></tr>').join('');document.getElementById('word-cloud').innerHTML=WT.map(w=>'<span class="word-tag" style="font-size:'+w.s+'px">'+w.t+'</span>').join('');document.getElementById('total-products').textContent=f.length;document.getElementById('avg-price').textContent='¥'+Math.round(f.reduce((s,p)=>s+p.price,0)/f.length).toLocaleString();document.getElementById('total-sales').textContent=(f.reduce((s,p)=>s+p.sales,0)/10000).toFixed(1)+T('万','0k')}
render();
</script></body></html>
