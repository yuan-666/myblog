<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dictionary · Demo</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;padding:40px 20px}.app{max-width:680px;width:100%;animation:rise .45s ease both}header{text-align:center;margin-bottom:32px;padding:24px;background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}header h1{font-size:24px;font-weight:700;margin-bottom:6px}header p{font-size:13px;color:#86868b}.role-bar{display:flex;gap:8px;justify-content:center;margin-bottom:20px}.role-bar button{padding:6px 16px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}.role-bar button:hover,.hint-tags button:hover,.word-list .item:hover{transform:translateY(-1px)}.role-bar button.active{background:#0071e3;color:#fff;border-color:#0071e3;box-shadow:0 8px 18px rgba(0,113,227,.18)}.search-box{display:flex;gap:8px;margin-bottom:16px}.search-box input{flex:1;padding:12px 16px;border:1px solid #d2d2d7;border-radius:12px;font-size:15px;outline:none;font-family:inherit}.search-box input:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.1)}.search-box button{padding:12px 24px;background:#0071e3;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s,opacity .15s}.search-box button:hover{opacity:.85;transform:translateY(-1px)}.hint-tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}.hint-tags button{padding:4px 12px;border-radius:20px;border:1px solid #e5e5ea;background:#f5f5f7;font-size:12px;color:#86868b;cursor:pointer;font-family:monospace;transition:all .15s}.hint-tags button:hover{border-color:#0071e3;color:#0071e3}.result-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:none}.result-card.show{display:block;animation:pop .22s ease}.result-card .word{font-size:20px;font-weight:700;color:#0071e3;margin-bottom:8px}.result-card .pron{font-size:13px;color:#86868b;margin-bottom:12px}.result-card .def{font-size:15px;color:#1d1d1f;line-height:1.8}.result-card .meta{font-size:11px;color:#aeaeb2;margin-top:12px;padding-top:12px;border-top:1px solid #f5f5f7}.form-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;display:none}.form-card.show{display:block;animation:pop .22s ease}.form-card h3{font-size:16px;margin-bottom:14px}.form-row{display:flex;gap:8px;margin-bottom:10px}.form-row input{flex:1;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;outline:none;font-family:inherit}.form-actions{display:flex;gap:8px;margin-top:12px}.form-actions button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:transform .15s}.form-actions button:hover{transform:translateY(-1px)}.btn-add{background:#34c759;color:#fff}.btn-del{background:#ff3b30;color:#fff}.btn-edit{background:#0071e3;color:#fff}.btn-reset{background:#f5f5f7;color:#86868b;border:1px solid #d2d2d7!important}.word-list{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.word-list h3{font-size:14px;color:#86868b;margin-bottom:10px}.word-list .item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f7;font-size:14px;cursor:pointer;transition:all .15s}.word-list .item:hover{color:#0071e3;padding-left:4px}.word-list .item:last-child{border-bottom:none}.word-list .item .en{font-weight:600}.word-list .count{font-size:12px;color:#86868b;text-align:right;margin-top:8px}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}.toast.show{opacity:1}.toast.success{background:#34c759;color:#fff}.toast.error{background:#ff3b30;color:#fff}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes pop{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:none}}</style></head>
<body><script>const L=((p=new URLSearchParams(location.search)).get('lang')||navigator.language.slice(0,2))==='en'?'en':'zh';const T=(zh,en)=>L==='en'?en:zh;</script>
<div class="app">
<header><h1>📖 <script>document.write(T('电子英汉词典','E-C Dictionary'))</script></h1><p><script>document.write(T('词条录入 · 查询 · 修改 · 删除 · CSV持久化','Entry · Query · Edit · Delete · CSV Persistence'))</script></p></header>
<div class="role-bar">
  <button id="role-guest" class="active" onclick="setRole('guest')">👤 <script>document.write(T('访客模式','Guest'))</script></button>
  <button id="role-admin" onclick="setRole('admin')">🔐 <script>document.write(T('管理员模式','Admin'))</script></button>
</div>
<div class="search-box">
  <input id="search-input" type="text" placeholder="Enter English word..." onkeyup="if(event.key==='Enter')search()">
  <button onclick="search()"><script>document.write(T('查询','Search'))</script></button>
</div>
<div class="hint-tags" id="hints"></div>
<div class="result-card" id="result"></div>
<div class="form-card" id="form-card">
  <h3 id="form-title"><script>document.write(T('添加新词条','Add New Entry'))</script></h3>
  <div class="form-row"><input id="form-en" placeholder="English"><input id="form-cn" placeholder="Chinese"></div>
  <div class="form-actions">
    <button class="btn-add" onclick="addWord()">✅ <script>document.write(T('添加','Add'))</script></button>
    <button class="btn-edit" onclick="editWord()" style="display:none">✏️ <script>document.write(T('修改','Edit'))</script></button>
    <button class="btn-del" onclick="deleteWordUI()">🗑️ <script>document.write(T('删除','Delete'))</script></button>
    <button class="btn-reset" onclick="resetDict()">🔄 <script>document.write(T('恢复默认','Reset'))</script></button>
  </div>
</div>
<div class="word-list"><h3>📋 <script>document.write(T('词条列表','Word List'))</script> (<span id="word-count">0</span>)</h3><div id="word-items"></div></div>
</div><div class="toast" id="toast"></div>
<script>
const DEFAULT_DICT={'python':{cn:'Python — 一种高级编程语言，以简洁优雅的语法著称，广泛应用于数据科学、Web开发和AI领域。',pron:'/ˈpaɪθɑːn/'},'algorithm':{cn:'Algorithm — 算法，解决问题的一系列明确指令，是计算机科学的核心概念。',pron:'/ˈælɡərɪðəm/'},'function':{cn:'Function — 函数，一段可重复使用的代码块，接受输入参数并返回结果。',pron:'/ˈfʌŋkʃən/'},'variable':{cn:'Variable — 变量，存储数据的命名容器，其值可在程序运行期间改变。',pron:'/ˈvɛriəbəl/'},'database':{cn:'Database — 数据库，有组织的数据集合，通过DBMS进行管理和查询。',pron:'/ˈdeɪtəbeɪs/'},'docker':{cn:'Docker — 容器化平台，将应用及其依赖打包成轻量级容器，实现环境一致性。',pron:'/ˈdɒkər/'},'git':{cn:'Git — 分布式版本控制系统，用于跟踪文件变化和协调多人协作开发。',pron:'/ɡɪt/'},'api':{cn:'API — 应用程序接口，定义了不同软件组件之间交互的规则和协议。',pron:'/ˌeɪ.piːˈaɪ/'},'vue':{cn:'Vue.js — 渐进式JavaScript框架，用于构建用户界面和单页应用。',pron:'/vjuː/'},'spring':{cn:'Spring Boot — Java企业级开发框架，简化了Spring应用的初始搭建和开发。',pron:'/sprɪŋ/'},'redis':{cn:'Redis — 开源的内存数据结构存储，用作数据库、缓存和消息代理。',pron:'/ˈrɛdɪs/'},'mysql':{cn:'MySQL — 流行的开源关系型数据库管理系统。',pron:'/maɪ ɛs kjuː ˈɛl/'},'nginx':{cn:'Nginx — 高性能HTTP和反向代理服务器。',pron:'/ˌɛndʒɪnˈɛks/'},'react':{cn:'React — 用于构建用户界面的JavaScript库，由Meta开发维护。',pron:'/riˈækt/'},'kubernetes':{cn:'Kubernetes — 开源容器编排平台，自动化容器化应用的部署和管理。',pron:'/kuːbərˈnɛtɪs/'}};
let dict={},role='guest';
function loadDict(){try{const d=localStorage.getItem('demo-dict');dict=d?JSON.parse(d):JSON.parse(JSON.stringify(DEFAULT_DICT))}catch{dict=JSON.parse(JSON.stringify(DEFAULT_DICT))}renderList();renderHints()}
function saveDict(){try{localStorage.setItem('demo-dict',JSON.stringify(dict))}catch(e){toast(T('存储空间不足！','Storage full!'),'error')}renderList()}
function setRole(r){role=r;document.getElementById('role-guest').classList.toggle('active',r==='guest');document.getElementById('role-admin').classList.toggle('active',r==='admin');document.getElementById('form-card').classList.toggle('show',r==='admin')}
function search(){const q=document.getElementById('search-input').value.trim().toLowerCase();if(!q){toast(T('请输入要查询的单词','Enter a word to search'),'error');return}const e=dict[q],c=document.getElementById('result');if(e)c.innerHTML='<div class="word">'+q+'</div><div class="pron">'+(e.pron||'')+'</div><div class="def">'+e.cn+'</div><div class="meta">'+T('数据来源：本地CSV存储','Source: Local CSV Storage')+' · '+T('角色：','Role: ')+(role==='admin'?T('管理员','Admin'):T('访客','Guest'))+'</div>';else c.innerHTML='<div class="word">❌ '+T('未找到','Not found')+' "'+q+'"</div><div class="def">'+T('该词条不在词典中，请检查拼写或联系管理员添加。','Word not found. Check spelling or ask admin to add it.')+'</div>';c.classList.add('show')}
function addWord(){if(role!=='admin'){toast(T('仅管理员可添加词条','Admin only'),'error');return}const en=document.getElementById('form-en').value.trim().toLowerCase(),cn=document.getElementById('form-cn').value.trim();if(!en||!cn){toast(T('请填写英文和中文','Fill in both fields'),'error');return}if(!/^[a-z]+$/i.test(en)){toast(T('英文单词只能包含字母','English only: letters'),'error');return}dict[en]={cn,pron:''};saveDict();document.getElementById('form-en').value='';document.getElementById('form-cn').value='';toast(T('已添加: ','Added: ')+en,'success')}
function editWord(){const en=document.getElementById('form-en').value.trim().toLowerCase(),cn=document.getElementById('form-cn').value.trim();if(!en||!cn){toast(T('请填写英文和中文','Fill in both'),'error');return}if(!dict[en]){toast(T('词条不存在','Entry not found'),'error');return}dict[en]={cn,pron:dict[en].pron||''};saveDict();toast(T('已修改: ','Modified: ')+en,'success')}
function deleteWordUI(){if(role!=='admin'){toast(T('仅管理员可删除','Admin only'),'error');return}const en=document.getElementById('form-en').value.trim().toLowerCase();if(!en){toast(T('请输入要删除的单词','Enter word to delete'),'error');return}if(!dict[en]){toast(T('词条不存在','Entry not found'),'error');return}delete dict[en];saveDict();toast(T('已删除: ','Deleted: ')+en,'success')}
function resetDict(){if(!confirm(T('确认恢复默认词典？','Reset to default dictionary?')))return;dict=JSON.parse(JSON.stringify(DEFAULT_DICT));saveDict();toast(T('已恢复默认','Reset complete'),'success')}
function renderList(){const keys=Object.keys(dict).sort();document.getElementById('word-count').textContent=keys.length;document.getElementById('word-items').innerHTML=keys.map(k=>'<div class="item" onclick="selectWord(\''+k+'\')"><span class="en">'+k+'</span><span>'+dict[k].cn.slice(0,24)+'...</span></div>').join('')}
function renderHints(){const keys=Object.keys(dict).sort(()=>Math.random()-.5).slice(0,8);document.getElementById('hints').innerHTML=keys.map(k=>'<button onclick="selectWord(\''+k+'\')">'+k+'</button>').join('')}
function selectWord(w){document.getElementById('search-input').value=w;document.getElementById('form-en').value=w;document.getElementById('form-cn').value=dict[w]?.cn||'';search()}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
loadDict();setRole('guest');
</script></body></html>
